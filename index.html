<!DOCTYPE html>
<html>
<head>
  <title>Jesse & Co</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .tabs {
      display: flex;
      background: #ddd;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: #ccc;
    }

    .tab.active {
      background: white;
      font-weight: bold;
    }

    .content {
      padding: 20px;
    }

    button {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
    }

    button.active {
      background: green;
    }
  </style>
</head>

<body>

<header>Jesse & Co</header>

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<script src="data.js"></script>

<script>
let currentTab = 0;

function loadTabs() {
  let tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";

  siteData.jobs.forEach((job, index) => {
    let tab = document.createElement("div");
    tab.className = "tab" + (index === currentTab ? " active" : "");
    tab.innerText = job.name;

    tab.onclick = () => {
      currentTab = index;
      loadTabs();
      loadContent();
    };

    tabsDiv.appendChild(tab);
  });
}

function loadContent() {
  let content = document.getElementById("content");
  content.innerHTML = "";

  let job = siteData.jobs[currentTab];

  job.buttons.forEach(btn => {
    let button = document.createElement("button");
    button.innerText = btn.text;

    if (btn.active) button.classList.add("active");

    button.onclick = () => {
      btn.active = !btn.active;
      loadContent();
    };

    content.appendChild(button);
  });
}

loadTabs();
loadContent();
</script>

</body>
</html>
