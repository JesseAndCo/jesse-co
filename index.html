<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesse & Co</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #0b0f1a;
        color: white;
    }

    header {
        background: linear-gradient(90deg, #00f5ff, #7c3aed);
        padding: 18px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
    }

    .tabs {
        display: flex;
        background: #111827;
    }

    .tabs button {
        flex: 1;
        padding: 12px;
        background: none;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .tabs button:hover {
        background: #1f2937;
    }

    .tab {
        display: none;
        padding: 20px;
    }

    .active {
        display: block;
    }

    .card {
        background: #111827;
        padding: 15px;
        border-radius: 10px;
        margin-top: 10px;
        border: 1px solid #222;
    }

    button {
        padding: 10px;
        width: 100%;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    .green { background: #00f5ff; color: black; }
    .red { background: #ff4d6d; color: white; }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: none;
        background: #1f2937;
        color: white;
    }

    /* CHAT BOX */
    #chatBox {
        height: 250px;
        overflow-y: auto;
        background: #0f172a;
        border: 1px solid #222;
        padding: 10px;
        border-radius: 8px;
    }

    .msg {
        margin: 5px 0;
        padding: 6px;
        background: #1f2937;
        border-radius: 6px;
    }

    #adminPanel {
        display: none;
        margin-top: 10px;
        padding: 15px;
        background: #0f172a;
        border-radius: 10px;
        border: 1px solid #222;
    }
</style>
</head>

<body>

<header>Jesse & Co</header>

<div class="tabs">
    <button onclick="openTab('home')">Home</button>
    <button onclick="openTab('chat')">Chat</button>
    <button onclick="openTab('cash')">Cash App</button>
    <button onclick="openTab('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="tab active">
    <div class="card">
        <h3>Status</h3>
        <p id="statusText">Not coming through</p>
    </div>
</div>

<!-- CHAT -->
<div id="chat" class="tab">
    <div class="card">
        <h3>Chat</h3>

        <div id="chatBox"></div>

        <input id="msgInput" placeholder="Type message...">
        <button class="green" onclick="sendMsg()">Send</button>
    </div>
</div>

<!-- CASH APP -->
<div id="cash" class="tab">
    <div class="card">
        <h3>Cash App</h3>
        <p id="cashText">$Cocoabeans12</p>
    </div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
    <div class="card">
        <h3>Admin Login</h3>
        <input type="password" id="pass" placeholder="Password">
        <button class="green" onclick="login()">Login</button>
    </div>

    <div id="adminPanel">

        <h3>Admin Controls</h3>

        <p>Status Control</p>
        <button class="green" onclick="setStatus(true)">Coming through</button>
        <button class="red" onclick="setStatus(false)">Not coming through</button>

        <p>Edit Cash App</p>
        <input id="cashInput" placeholder="Change Cash App">
        <button class="green" onclick="updateCash()">Update</button>

        <p>Clear Chat</p>
        <button class="red" onclick="clearChat()">Clear Messages</button>

        <button class="red" onclick="logout()">Logout</button>
    </div>
</div>

<script>
function openTab(tab){
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(tab).classList.add("active");
}

/* STATUS */
function setStatus(state){
    document.getElementById("statusText").innerText =
        state ? "Coming through" : "Not coming through";
}

/* CASH APP */
function updateCash(){
    let val = document.getElementById("cashInput").value;
    document.getElementById("cashText").innerText = val;
}

/* LOGIN */
function login(){
    let p = document.getElementById("pass").value;
    if(p === "0827"){
        document.getElementById("adminPanel").style.display = "block";
        alert("Admin unlocked");
    } else {
        alert("Wrong password");
    }
}

function logout(){
    document.getElementById("adminPanel").style.display = "none";
}

/* CHAT (simple local version) */
function sendMsg(){
    let input = document.getElementById("msgInput");
    let text = input.value;
    if(!text) return;

    let box = document.getElementById("chatBox");

    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = text;

    box.appendChild(div);
    input.value = "";

    box.scrollTop = box.scrollHeight;
}

function clearChat(){
    document.getElementById("chatBox").innerHTML = "";
}
</script>

</body>
</html>
