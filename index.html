<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesse & Co</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
}

header {
    background: linear-gradient(90deg, #00f5ff, #7c3aed);
    padding: 16px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

.tabs {
    display: flex;
    background: #111827;
}

.tabs button {
    flex: 1;
    padding: 12px;
    border: none;
    background: none;
    color: white;
    font-weight: bold;
}

.tab {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    border: 1px solid #222;
}

/* JOBS */
.job {
    background: #0f172a;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #222;
}

/* CASH APP */
.cashapp {
    background: linear-gradient(90deg, #00f5ff, #22c55e);
    padding: 15px;
    border-radius: 10px;
    color: black;
    font-weight: bold;
    text-align: center;
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

/* BUTTONS */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}

.green { background: #00f5ff; }
.red { background: #ff4d6d; }

/* ADMIN */
#adminPanel {
    display: none;
    margin-top: 10px;
    padding: 15px;
    background: #0f172a;
    border-radius: 10px;
    border: 1px solid #222;
}
</style>
</head>

<body>

<header>Jesse & Co</header>

<div class="tabs">
    <button onclick="openTab('home')">Home</button>
    <button onclick="openTab('jobs')">Jobs</button>
    <button onclick="openTab('cash')">Cash App</button>
    <button onclick="openTab('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="tab active">
    <div class="card">
        <h3>Status</h3>
        <p id="statusText">Not coming through</p>
    </div>
</div>

<!-- JOBS -->
<div id="jobs" class="tab">
    <div class="card">
        <h3>Jobs</h3>
        <div id="jobList"></div>
    </div>
</div>

<!-- CASH APP -->
<div id="cash" class="tab">
    <div class="cashapp">
        Cash App: <span id="cashText">$Cocoabeans12</span>
    </div>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
    <div class="card">
        <h3>Admin Login</h3>
        <input type="password" id="pass" placeholder="Password">
        <button class="green" onclick="login()">Login</button>
    </div>

    <div id="adminPanel">

        <h3>Admin Controls</h3>

        <!-- STATUS -->
        <button class="green" onclick="setStatus('Coming through')">Coming through</button>
        <button class="red" onclick="setStatus('Not coming through')">Not coming through</button>

        <input id="customStatus" placeholder="Custom status">
        <button class="green" onclick="updateStatus()">Update Status</button>

        <!-- CASH APP EDIT -->
        <h3>Cash App Edit</h3>
        <input id="cashInput" placeholder="Enter new Cash App">
        <button class="green" onclick="updateCash()">Update Cash App</button>

        <button class="red" onclick="logout()">Logout</button>
    </div>
</div>

<script>
let jobs = [];

function openTab(tab){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(tab).classList.add("active");
}

/* STATUS */
function setStatus(text){
document.getElementById("statusText").innerText = text;
}

function updateStatus(){
document.getElementById("statusText").innerText =
document.getElementById("customStatus").value;
}

/* CASH APP EDIT */
function updateCash(){
let val = document.getElementById("cashInput").value;
if(!val) return;

document.getElementById("cashText").innerText = val;
}

/* JOBS */
function addJob(){
let title = document.getElementById("jobTitle").value;
let desc = document.getElementById("jobDesc").value;

jobs.push({title,desc});
renderJobs();
}

function renderJobs(){
let box = document.getElementById("jobList");
box.innerHTML = "";

jobs.forEach(j=>{
let d = document.createElement("div");
d.className="job";
d.innerHTML="<b>"+j.title+"</b><br>"+j.desc;
box.appendChild(d);
});
}

/* ADMIN */
function login(){
if(document.getElementById("pass").value==="0827"){
document.getElementById("adminPanel").style.display="block";
}
}

function logout(){
document.getElementById("adminPanel").style.display="none";
}
</script>

</body>
</html>
