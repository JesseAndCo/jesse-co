<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jesse & Co</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a1f44;
    color: white;
}

header {
    background: #0d2c6b;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    padding: 20px;
    max-width: 800px;
    margin: auto;
}

.section {
    background: #132f66;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    border: none;
}

input {
    background: #0f2a5c;
    color: white;
}

button {
    background: #2d6cdf;
    color: white;
    cursor: pointer;
}

.card {
    background: #0f2a5c;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
}

/* calendar */
.calendar-item {
    padding: 8px;
    margin-top: 8px;
    background: #0f2a5c;
    border-radius: 6px;
}
</style>
</head>

<body>

<header>Jesse & Co</header>

<div class="container">

<!-- POSTS -->
<div class="section">
<h2>📢 Updates</h2>

<input id="postInput" placeholder="Write an update...">
<button onclick="addPost()">Post</button>

<div id="posts"></div>
</div>

<!-- CALENDAR -->
<div class="section">
<h2>📅 Calendar</h2>

<input id="eventInput" placeholder="Add event...">
<button onclick="addEvent()">Add Event</button>

<div id="calendar"></div>
</div>

<!-- CASHAPP -->
<div class="section">
<h2>💸 Cash App</h2>
<p>Send payments here:</p>
<div class="card">$YourCashTagHere</div>
</div>

</div>

<script>

// POSTS
let posts = JSON.parse(localStorage.getItem("posts")) || [];

function renderPosts() {
    let box = document.getElementById("posts");
    box.innerHTML = "";
    posts.forEach(p => {
        let div = document.createElement("div");
        div.className = "card";
        div.textContent = p;
        box.appendChild(div);
    });
}

function addPost() {
    let input = document.getElementById("postInput");
    if(input.value.trim() === "") return;

    posts.unshift(input.value);
    localStorage.setItem("posts", JSON.stringify(posts));
    input.value = "";
    renderPosts();
}

// CALENDAR
let events = JSON.parse(localStorage.getItem("events")) || [];

function renderEvents() {
    let box = document.getElementById("calendar");
    box.innerHTML = "";
    events.forEach(e => {
        let div = document.createElement("div");
        div.className = "calendar-item";
        div.textContent = e;
        box.appendChild(div);
    });
}

function addEvent() {
    let input = document.getElementById("eventInput");
    if(input.value.trim() === "") return;

    events.unshift(input.value);
    localStorage.setItem("events", JSON.stringify(events));
    input.value = "";
    renderEvents();
}

renderPosts();
renderEvents();

</script>

</body>
</html>
